<!DOCTYPE html>
<html>
  <head>
    <title>Doccox — Literate Programming Viewer</title>
    <meta charset="utf-8" />
    <link rel="icon" href="data:,">
    <style>
      /* CoffeeScript docco style: white prose left, lavender code right */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.75;
        color: #444;
        background: #fff;
      }

      /* ── Tab bar (minimal, light) ── */
      .tab-bar {
        display: flex;
        background: #fff;
        padding: 10px 24px 0;
        align-items: flex-end;
        gap: 0;
        border-bottom: 1px solid #e8e8e8;
        flex-shrink: 0;
      }
      .tab-btn {
        padding: 6px 16px 8px;
        background: transparent;
        color: #888;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: -1px;
        transition: color 0.12s, border-color 0.12s;
      }
      .tab-btn:hover { color: #333; }
      .tab-btn.active {
        color: #222;
        font-weight: 600;
        border-bottom-color: #557daa;
      }

      /* ── Sample selector ── */
      .sample-bar {
        display: flex;
        gap: 6px;
        padding: 8px 24px;
        background: #fafafa;
        border-bottom: 1px solid #eee;
        align-items: center;
        flex-wrap: wrap;
        flex-shrink: 0;
      }
      .sample-label {
        font-size: 11px;
        color: #aaa;
        font-weight: 500;
        letter-spacing: 0.04em;
        margin-right: 4px;
      }
      .sample-btn {
        padding: 2px 10px;
        background: transparent;
        border: 1px solid #ddd;
        border-radius: 2px;
        cursor: pointer;
        font-size: 12px;
        color: #666;
        transition: all 0.12s;
      }
      .sample-btn:hover { border-color: #bbb; color: #333; }
      .sample-btn.active {
        background: #557daa;
        color: #fff;
        border-color: #557daa;
      }

      /* ── Markdown mode ── */
      .markdown-view { padding: 24px 32px; max-width: 900px; }
      .markdown-textarea {
        width: 100%;
        height: calc(100vh - 90px);
        font-family: Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.7;
        border: 1px solid #e0e0e0;
        padding: 16px 20px;
        background: #f5f7ff;
        resize: none;
        outline: none;
        color: #1a3a5c;
      }

      /* ── Docco layout ── */
      .docco-view { display: block; }

      .docco-section {
        display: flex;
        /* no horizontal borders — background alone separates columns */
      }

      .docco-docs {
        width: 35%;
        padding: 24px 32px 24px 28px;
        background: #fff;
        font-size: 14px;
        line-height: 1.8;
        color: #444;
        overflow-wrap: break-word;
        min-width: 0;
      }

      .docco-code {
        width: 65%;
        padding: 24px 28px 24px 32px;
        background: #f5f7ff;
        min-width: 0;
      }
      .docco-code > pre {
        margin: 0;
        font-family: Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-all;
        color: #1a3a5c;
      }

      /* ── Markdown rendered in docs column ── */
      .docco-docs h1,
      .docco-docs h2,
      .docco-docs h3,
      .docco-docs h4 {
        font-weight: 700;
        color: #222;
        margin: 20px 0 8px;
        line-height: 1.3;
      }
      .docco-docs h1 {
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-top: 0;
        border: none;
        padding: 0;
      }
      .docco-docs h2 { font-size: 14px; font-weight: 600; }
      .docco-docs h3 { font-size: 13px; font-weight: 600; color: #555; }
      .docco-docs p  { margin: 0 0 14px; }
      .docco-docs ul, .docco-docs ol { margin: 0 0 14px; padding-left: 22px; }
      .docco-docs li { margin: 4px 0; }
      .docco-docs code {
        background: #f0f0f0;
        border: 1px solid #e8e8e8;
        border-radius: 2px;
        padding: 1px 5px;
        font-family: Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        color: #333;
      }
      .docco-docs a { color: #557daa; text-decoration: none; }
      .docco-docs a:hover { text-decoration: underline; }
      .docco-docs blockquote {
        border-left: 3px solid #ddd;
        padding-left: 14px;
        color: #777;
        margin: 10px 0;
      }
      .docco-docs strong { font-weight: 600; color: #333; }

      /* ── Extended blocks (right column, light theme) ── */
      .ext-block {
        border: 1px solid #d8dff0;
        border-radius: 3px;
        overflow: hidden;
        margin: 12px 0;
        background: #fff;
      }
      .ext-header {
        display: flex;
        align-items: center;
        background: #eef1fa;
        padding: 4px 12px;
        gap: 8px;
        border-bottom: 1px solid #d8dff0;
      }
      .ext-lang {
        font-size: 10px;
        color: #8899bb;
        font-family: Menlo, Monaco, Consolas, monospace;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .ext-actions { margin-left: auto; display: flex; gap: 6px; }
      .ext-run-btn, .ext-toggle-btn {
        padding: 2px 10px;
        border: 1px solid #c0cce0;
        border-radius: 2px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        background: #fff;
        color: #557daa;
      }
      .ext-run-btn:hover, .ext-toggle-btn:hover {
        background: #557daa;
        color: #fff;
        border-color: #557daa;
      }
      .ext-run-btn.moonbit { color: #6b4fbb; border-color: #c8b8e8; }
      .ext-run-btn.moonbit:hover { background: #6b4fbb; color: #fff; border-color: #6b4fbb; }

      .ext-body {
        background: #f5f7ff;
        padding: 12px 16px;
        overflow-x: auto;
      }
      .ext-body pre {
        margin: 0;
        font-family: Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.7;
        color: #1a3a5c;
        white-space: pre-wrap;
      }
      .ext-output {
        background: #f0faf2;
        padding: 8px 16px;
        font-family: Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        color: #2d6a3e;
        white-space: pre-wrap;
        border-top: 1px solid #d8e8da;
      }
      .ext-chart-container {
        background: #fff;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ext-chart-container svg { max-width: 100%; display: block; }

      /* ── Empty state ── */
      .empty-docco {
        display: flex;
        align-items: center;
        justify-content: center;
        height: calc(100vh - 90px);
        color: #bbb;
        font-size: 14px;
        flex-direction: column;
        gap: 10px;
        background: #f5f7ff;
      }
      .empty-docco .hint {
        font-size: 12px;
        color: #ccc;
        font-family: Menlo, Monaco, Consolas, monospace;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  </head>
  <body>
    <div class="app"></div>
    <script src="./_build/js/debug/build/app.js" type="module" defer></script>
  </body>
</html>
